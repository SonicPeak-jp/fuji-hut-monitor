name: 空き状況チェック

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  issues: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  check-and-publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: 空き状況をチェックしてページ生成
        id: gen
        run: python3 cloud_check.py
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
      - name: 空き通知のIssueを作成(メール通知)
        if: steps.gen.outputs.new != ''
        env:
          GH_TOKEN: ${{ github.token }}
          NEW_AVAIL: ${{ steps.gen.outputs.new }}
        run: |
          gh issue create --repo "${{ github.repository }}" \
            --title "🗻🎉 山小屋に空きが出ました: ${NEW_AVAIL}" \
            --body "$(printf '新たに空きを検知しました: %s\n\n- 空き状況ページ: https://sonicpeak-jp.github.io/fuji-hut-monitor/\n- トモエ館 予約: https://tomoekan.com/8tomoekan-calender/?ct=1785542400\n- 太子館 予約: https://www.tenawan.ne.jp/lodgment/rec/007/617/pcr.asp\n- 東洋館 予約: https://www.489pro.com/asp/489/menu.asp?id=19000037\n\n△は残りわずかです。お早めに！' "${NEW_AVAIL}")"
