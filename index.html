<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>🗻 富士山山小屋 空き状況モニター</title>
<style>
  :root {
    --bg: #f4f6f8; --card: #fff; --text: #1a2733; --sub: #6b7a88;
    --ok: #e7f7ec; --ok-border: #34a853; --ok-text: #1e7e34;
    --ng: #f6f7f8; --ng-text: #b0b8bf; --accent: #2b6cb0;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
         background: var(--bg); color: var(--text); }
  header { background: linear-gradient(135deg, #2b6cb0, #4c8fd6); color: #fff;
           padding: 18px 24px; display: flex; align-items: center; gap: 12px;
           flex-wrap: wrap; }
  header h1 { font-size: 20px; margin: 0; flex: 1; }
  header .meta { font-size: 12px; opacity: .9; }
  button { background: #fff; color: var(--accent); border: none; border-radius: 8px;
           padding: 8px 14px; font-size: 13px; font-weight: 600; cursor: pointer; }
  button:active { transform: scale(.97); }
  main { max-width: 980px; margin: 0 auto; padding: 20px 16px 60px; }
  .banner { border-radius: 12px; padding: 14px 18px; margin-bottom: 20px;
            font-weight: 600; }
  .banner.none { background: #eef1f4; color: var(--sub); }
  .banner.found { background: var(--ok); color: var(--ok-text);
                  border: 2px solid var(--ok-border); }
  .site { background: var(--card); border-radius: 14px; padding: 18px 20px;
          margin-bottom: 22px; box-shadow: 0 1px 4px rgba(0,0,0,.07); }
  .site h2 { margin: 0 0 4px; font-size: 17px; }
  .site h2 a { font-size: 12px; font-weight: normal; margin-left: 10px; }
  .site .err { color: #c0392b; font-size: 13px; margin: 6px 0; }
  .cal { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px;
         margin-top: 12px; }
  .cal .wd { text-align: center; font-size: 11px; color: var(--sub); padding: 4px 0; }
  .cell { border-radius: 8px; min-height: 52px; padding: 5px 6px; font-size: 12px;
          background: var(--ng); color: var(--ng-text); position: relative; }
  .cell .d { font-size: 11px; }
  .cell .mark { font-size: 16px; font-weight: 700; text-align: center; margin-top: 2px; }
  .cell.avail { background: var(--ok); color: var(--ok-text);
                border: 2px solid var(--ok-border); cursor: pointer; }
  .cell.avail:hover { filter: brightness(.96); }
  .cell.empty { background: transparent; }
  .rooms { position: absolute; z-index: 5; left: 0; top: 100%; background: #fff;
           border: 1px solid #ccc; border-radius: 8px; padding: 8px 10px;
           font-size: 11px; color: var(--text); white-space: nowrap;
           box-shadow: 0 4px 12px rgba(0,0,0,.15); display: none; }
  .cell:hover .rooms { display: block; }
  .rooms .r-ok { color: var(--ok-text); font-weight: 600; }
  .rooms .r-ng { color: var(--ng-text); }
  .events { background: var(--card); border-radius: 14px; padding: 18px 20px;
            box-shadow: 0 1px 4px rgba(0,0,0,.07); }
  .events h2 { font-size: 15px; margin: 0 0 10px; }
  .events ul { margin: 0; padding: 0; list-style: none; font-size: 13px; }
  .events li { padding: 5px 0; border-bottom: 1px solid #eef1f4; }
  .events .open { color: var(--ok-text); font-weight: 600; }
  .events .close { color: var(--sub); }
  .footnote { font-size: 11px; color: var(--sub); margin-top: 8px; }
</style>
</head>
<body>
<header>
  <h1>🗻 富士山山小屋 空き状況モニター <small style="font-weight:normal">2026年8月</small></h1>
  <span class="meta" id="lastCheck">読み込み中…</span>
  <button id="refreshBtn">今すぐチェック</button>
  <button id="notifyBtn">通知テスト</button>
</header>
<main>
  <div id="banner" class="banner none">読み込み中…</div>
  <div id="sites"></div>
  <div class="events">
    <h2>検知履歴</h2>
    <ul id="events"><li>まだ履歴はありません</li></ul>
  </div>
  <p class="footnote">○ = 空室あり、△ = 残りわずか、× = 満室。
     サーバーがチェックを実行し、空きが出た瞬間に macOS 通知が届きます。
     このページを開いていなくても通知されます（app.py が起動している間）。
     空きセルをクリックすると予約ページを開きます。</p>
</main>
<script>
// file:// やプレビューパネルで直接開いた場合はローカルサーバーを絶対URLで参照する
const API = location.protocol.startsWith("http") && location.port === "8787"
  ? "" : "http://localhost:8787";
const WDAYS = ["日","月","火","水","木","金","土"];
const SITE_ORDER = ["tomoekan", "taishikan", "toyokan"];

function calHtml(site) {
  let html = '<div class="cal">' + WDAYS.map(w => `<div class="wd">${w}</div>`).join("");
  const first = new Date(2026, 7, 1);        // 2026-08-01
  for (let i = 0; i < first.getDay(); i++) html += '<div class="cell empty"></div>';
  for (let d = 1; d <= 31; d++) {
    const key = `2026-08-${String(d).padStart(2, "0")}`;
    const info = site.dates[key];
    if (!info) { html += `<div class="cell"><span class="d">${d}</span><div class="mark">?</div></div>`; continue; }
    const cls = info.available ? "cell avail" : "cell";
    const mark = info.available ? (info.mark && info.mark !== "○" ? info.mark : "○") : "×";
    let rooms = "";
    if (info.rooms) {
      rooms = '<div class="rooms">' + info.rooms.map(r =>
        `<div class="${r.available ? "r-ok" : "r-ng"}">${r.name}: ${r.mark}</div>`).join("") + "</div>";
    }
    const click = info.available ? ` onclick="window.open('${site.url}','_blank')"` : "";
    html += `<div class="${cls}"${click}><span class="d">${d}</span><div class="mark">${mark}</div>${rooms}</div>`;
  }
  return html + "</div>";
}

function render(s) {
  document.getElementById("lastCheck").textContent =
    s.lastCheck ? `最終チェック: ${s.lastCheck}（${s.intervalMin}分間隔）` : "初回チェック中…";

  const allAvail = [];
  let html = "";
  for (const key of SITE_ORDER) {
    const site = s.sites[key];
    const avail = Object.keys(site.dates).filter(d => site.dates[d].available).sort();
    avail.forEach(d => allAvail.push(`${site.name} ${d.slice(5).replace("-", "/")}`));
    html += `<section class="site"><h2>${site.name}
      <a href="${site.url}" target="_blank">予約ページ ↗</a></h2>`;
    if (site.error) html += `<div class="err">⚠ 取得エラー: ${site.error}</div>`;
    if (avail.length) html += `<div style="color:var(--ok-text);font-size:13px;font-weight:600">
      空きあり: ${avail.map(d => d.slice(5).replace("-", "/")).join("、")}</div>`;
    html += calHtml(site) + "</section>";
  }
  document.getElementById("sites").innerHTML = html;

  const banner = document.getElementById("banner");
  if (allAvail.length) {
    banner.className = "banner found";
    banner.textContent = "🎉 空きがあります！ " + allAvail.join("、");
  } else {
    banner.className = "banner none";
    banner.textContent = "現在、2026年8月の空きはありません。自動監視中です…";
  }

  const ev = document.getElementById("events");
  if (s.events.length) {
    ev.innerHTML = s.events.slice(0, 30).map(e =>
      `<li class="${e.type}">${e.time} — ${e.site} ${e.date.slice(5).replace("-", "/")}` +
      (e.type === "open" ? " に空きが出ました 🎉" : " の空きが埋まりました") + "</li>").join("");
  }

  notifyIfNew(allAvail);
}

// ブラウザ側通知（ページを開いている場合の補助）
function notifyIfNew(availList) {
  const prev = JSON.parse(localStorage.getItem("fujiAvail") || "[]");
  const fresh = availList.filter(x => !prev.includes(x));
  localStorage.setItem("fujiAvail", JSON.stringify(availList));
  if (fresh.length && Notification.permission === "granted") {
    new Notification("🗻 山小屋に空きが出ました！", { body: fresh.join("、") });
  }
}

async function load() {
  try {
    const res = await fetch(API + "/api/status");
    render(await res.json());
  } catch (e) {
    document.getElementById("banner").textContent =
      "サーバーに接続できません（app.py が起動しているか確認してください）: " + e;
  }
}

document.getElementById("refreshBtn").onclick = async () => {
  await fetch(API + "/api/refresh", { method: "POST" });
  document.getElementById("lastCheck").textContent = "チェック中…";
  setTimeout(load, 6000);
};
document.getElementById("notifyBtn").onclick = () => fetch(API + "/api/test-notify", { method: "POST" });

if ("Notification" in window && Notification.permission === "default") Notification.requestPermission();
load();
setInterval(load, 60_000);
</script>
</body>
</html>
